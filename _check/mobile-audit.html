<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Audit mobile D'LYR</title>
<style>
  body{ margin:0; background:#333; font-family:monospace; color:#eee; display:flex; gap:20px; }
  #stage{ padding:16px; }
  iframe{ width:390px; height:780px; border:2px solid #666; background:#fff; display:block; }
  #report{ flex:1; padding:16px; font-size:11px; white-space:pre-wrap; overflow:auto; height:96vh; }
  h3{ margin:4px 0; color:#dbf83a; }
</style>
</head>
<body>
<div id="stage">
  <h3 id="cur">—</h3>
  <iframe id="fr" src="about:blank"></iframe>
</div>
<div id="report"></div>
<script>
const PAGES = [
  'index.html','catalogue.html','activites.html','evenements.html','entreprises.html',
  'snack-bar.html','offrir.html','faq.html','jeu-outbreak-lab.html','jeu-brain-arena.html',
  'cgv.html','mentions-legales.html','politique-confidentialite.html','404.html'
];
const fr = document.getElementById('fr');
const rep = document.getElementById('report');
const cur = document.getElementById('cur');

function selPath(el){
  let s = el.tagName.toLowerCase();
  if (el.id) s += '#'+el.id;
  if (el.className && typeof el.className === 'string') s += '.'+el.className.trim().split(/\s+/).slice(0,3).join('.');
  return s;
}

function probe(win){
  const doc = win.document;
  const vw = win.innerWidth;
  const res = { vw, scrollW: Math.max(doc.documentElement.scrollWidth, doc.body ? doc.body.scrollWidth : 0), overflow: [], smallText: [], tinyTaps: [] };
  const all = doc.querySelectorAll('body *');
  for (const el of all){
    const cs = win.getComputedStyle(el);
    if (cs.display === 'none' || cs.visibility === 'hidden') continue;
    const r = el.getBoundingClientRect();
    if (r.width === 0 && r.height === 0) continue;
    // horizontal overflow culprits (ignore if an ancestor clips them)
    if (r.right > vw + 1 || r.left < -1){
      let clipped = false, p = el.parentElement;
      while (p && p !== doc.body){
        const pcs = win.getComputedStyle(p);
        if (/(hidden|clip|auto|scroll)/.test(pcs.overflowX) ) { clipped = true; break; }
        p = p.parentElement;
      }
      if (!clipped && cs.position !== 'fixed') res.overflow.push(selPath(el)+' ['+Math.round(r.left)+'→'+Math.round(r.right)+']');
    }
    // small text
    const fs = parseFloat(cs.fontSize);
    if (fs && fs < 12 && el.textContent.trim().length > 2 && el.children.length === 0){
      res.smallText.push(selPath(el)+' '+fs.toFixed(1)+'px');
    }
    // tap targets
    if ((el.tagName === 'A' || el.tagName === 'BUTTON') && r.width > 0){
      if (r.height < 32 && r.top < win.innerHeight && r.bottom > 0){
        res.tinyTaps.push(selPath(el)+' '+Math.round(r.width)+'x'+Math.round(r.height));
      }
    }
  }
  res.overflow = [...new Set(res.overflow)].slice(0,12);
  res.smallText = [...new Set(res.smallText)].slice(0,8);
  res.tinyTaps = [...new Set(res.tinyTaps)].slice(0,10);
  return res;
}

function loadPage(src){
  return new Promise(resolve => {
    fr.onload = () => setTimeout(resolve, 1600); // laisse reveal/failsafe se poser
    fr.src = '../'+src;
  });
}

async function run(){
  const out = {};
  for (const p of PAGES){
    cur.textContent = p;
    try {
      await loadPage(p);
      out[p] = probe(fr.contentWindow);
    } catch(e){ out[p] = { error: String(e) }; }
    const r = out[p];
    rep.textContent += '\n=== '+p+' ===\n' + JSON.stringify(r, null, 1) + '\n';
    console.log('PG|'+p+'|sw:'+r.scrollW+'|ovf:'+JSON.stringify(r.overflow)+'|txt:'+JSON.stringify(r.smallText)+'|tap:'+JSON.stringify(r.tinyTaps));
  }
  cur.textContent = 'TERMINÉ';
  window.__auditDone = true;
  window.__audit = out;
}
run();

// API pour screenshots ciblés
window.showPage = (src) => { fr.onload = null; fr.src = '../'+src; cur.textContent = src; };
window.scrollFrame = (y) => { fr.contentWindow.scrollTo(0, y); };
</script>
</body>
</html>
