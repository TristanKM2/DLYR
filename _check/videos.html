<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<style>

figure{margin:0}video{width:100%;display:block}figcaption{font-size:12px;padding:4px}

<body>

document.querySelectorAll('video').forEach(v=>{v.addEventListener('loadedmetadata',()=>{v.currentTime=Math.min(3,v.duration/2)})});
</script>

</html>
