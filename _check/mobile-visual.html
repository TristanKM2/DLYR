<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Visuel mobile D'LYR</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,700;1,800&display=swap');
  html,body{ margin:0; background:#555; font-family:monospace; color:#fff; overflow:hidden; }
  #bar{ padding:4px 10px; font-size:12px; color:#dbf83a; height:18px; }
  #strip{ display:flex; gap:8px; padding:0 8px; align-items:flex-start; }
  .tile{ width:242px; height:524px; overflow:hidden; position:relative; outline:1px solid #000; flex:none; background:#272727; }
  .tile__inner{ position:absolute; left:0; top:0; width:390px; transform-origin:0 0; }
  #fr{ position:absolute; left:-4000px; top:0; width:390px; height:844px; border:0; }
</style>
</head>
<body>
<div id="bar">prêt</div>
<div id="strip"></div>
<iframe id="fr" src="about:blank"></iframe>
<script>
const fr = document.getElementById('fr');
const bar = document.getElementById('bar');
const strip = document.getElementById('strip');
const SEG = 844;
const SCALE = 524 / SEG;
window.__frozen = {};   // page -> {html, h}

function loadPage(src){
  return new Promise(res => { fr.onload = () => setTimeout(res, 1800); fr.src = '../' + src; });
}

const PROPS = null; // rempli au premier freeze

function copyStyles(src, dst, win){
  const cs = win.getComputedStyle(src);
  let txt = '';
  for (let i = 0; i < cs.length; i++){
    const p = cs[i];
    txt += p + ':' + cs.getPropertyValue(p) + ';';
  }
  dst.setAttribute('style', txt);
}

function pseudo(srcEl, dstEl, which, win, doc){
  const cs = win.getComputedStyle(srcEl, which);
  const content = cs.getPropertyValue('content');
  if (!content || content === 'none' || content === 'normal') return;
  const span = doc.createElement('span');
  let txt = '';
  for (let i = 0; i < cs.length; i++){
    const p = cs[i];
    if (p === 'content') continue;
    txt += p + ':' + cs.getPropertyValue(p) + ';';
  }
  span.setAttribute('style', txt);
  // texte du content s'il y en a
  const m = content.match(/^"(.*)"$/);
  if (m && m[1]) span.textContent = m[1];
  if (which === '::before') dstEl.insertBefore(span, dstEl.firstChild);
  else dstEl.appendChild(span);
}

function freezeNode(srcEl, win, doc){
  const tag = srcEl.tagName;
  if (tag === 'SCRIPT' || tag === 'LINK' || tag === 'STYLE' || tag === 'IFRAME') return null;
  let dst;
  if (tag === 'CANVAS'){
    dst = doc.createElement('img');
    try { dst.src = srcEl.toDataURL(); } catch(e){}
  } else if (tag === 'VIDEO'){
    dst = doc.createElement('div');
    dst.textContent = '▶ video';
    dst.style.cssText = 'display:grid;place-items:center;color:#888;background:#111;';
  } else {
    dst = doc.createElementNS(srcEl.namespaceURI, srcEl.tagName.toLowerCase());
    for (const a of srcEl.attributes){
      if (a.name === 'style') continue;
      try { dst.setAttribute(a.name, a.value); } catch(e){}
    }
    if (tag === 'IMG'){ dst.setAttribute('src', srcEl.currentSrc || srcEl.src); dst.removeAttribute('srcset'); dst.removeAttribute('loading'); }
  }
  const isSvgChild = srcEl.namespaceURI && srcEl.namespaceURI.indexOf('svg') !== -1 && tag !== 'svg';
  if (!isSvgChild) copyStyles(srcEl, dst, win);
  if (tag === 'VIDEO' || tag === 'CANVAS') { copyStyles(srcEl, dst, win); return dst; }
  if (!isSvgChild) pseudo(srcEl, dst, '::before', win, doc);
  for (const child of srcEl.childNodes){
    if (child.nodeType === 3) dst.appendChild(doc.createTextNode(child.nodeValue));
    else if (child.nodeType === 1){
      const c = freezeNode(child, win, doc);
      if (c) dst.appendChild(c);
    }
  }
  if (!isSvgChild) pseudo(srcEl, dst, '::after', win, doc);
  return dst;
}

window.capture = async function(page, prep, width){
  bar.textContent = 'capture ' + page + ' …';
  fr.style.width = (width || 390) + 'px';
  await loadPage(page);
  const doc = fr.contentDocument, win = fr.contentWindow;
  doc.querySelectorAll('.reveal').forEach(e => e.classList.add('in'));
  doc.documentElement.classList.add('force-show');
  if (prep) { try { prep(win, doc); } catch(e){ console.log('prep fail', String(e)); } }
  await new Promise(r => setTimeout(r, 400));
  const h = Math.max(doc.documentElement.scrollHeight, doc.body.scrollHeight);
  const frozen = freezeNode(doc.body, win, document);
  frozen.style.margin = '0';
  frozen.style.width = (width || 390) + 'px';
  window.__frozen[page] = { el: frozen, h };
  bar.textContent = page + ' gelé — ' + h + 'px';
  return h;
};

window.view = function(page, startSeg){
  const s = window.__frozen[page];
  if (!s){ bar.textContent = 'pas de gel pour ' + page; return; }
  strip.innerHTML = '';
  const total = Math.ceil(s.h / SEG);
  for (let i = 0; i < 3; i++){
    const seg = startSeg + i;
    if (seg >= total) break;
    const t = document.createElement('div');
    t.className = 'tile';
    const inner = document.createElement('div');
    inner.className = 'tile__inner';
    inner.style.transform = 'scale(' + SCALE + ') translateY(' + (-seg * SEG) + 'px)';
    inner.appendChild(s.el.cloneNode(true));
    t.appendChild(inner);
    strip.appendChild(t);
  }
  bar.textContent = page + ' — segments ' + startSeg + '–' + Math.min(startSeg + 2, total - 1) + ' / ' + (total - 1);
};

window.captureAndView = async function(page, seg, prep, width){ await window.capture(page, prep, width); window.view(page, seg || 0); };
</script>
</body>
</html>
