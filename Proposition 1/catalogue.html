<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D'LYR — Catalogue des expériences VR</title>
<meta name="description" content="Découvrez toutes les expériences VR de D'LYR : action, horreur, aventure, famille. Filtrez par genre, durée et nombre de joueurs.">
<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/pages.css">
<link rel="stylesheet" href="css/cat-list.css">
<link rel="stylesheet" href="css/tweaks.css">
</head>
<body data-page="catalogue" data-nav="paper">

<!-- ===== PAGE HERO ===== -->
<section class="phero">
  <div class="wrap phero__grid">
    <div class="reveal">
      <h1 class="phero__title">Catalogue<br>VR</h1>
      <p class="phero__lead">Plus de 20 expériences immersives en réalité virtuelle. Action, horreur, aventure ou famille&nbsp;: trouvez le monde qui vous fera vibrer.</p>
      <div class="phero__cue">
        <span class="btn-arrow btn-arrow--lime" data-arrow></span>
        <span style="font-family:var(--f-btn);font-size:clamp(18px,1.6vw,24px)">Explorez nos mondes</span>
      </div>
    </div>
    <div class="phero__deco reveal" data-d="1">
      <div class="ph"><span class="ph__label">Visuel · VR</span></div>
      <div class="ph"><span class="ph__label">Visuel · VR</span></div>
    </div>
  </div>
</section>

<!-- ===== CATALOGUE ===== -->
<section class="section bg-ink cat">
  <div class="wrap">
    <div class="cat__bar reveal">
      <div class="cat__filters" data-genre-filters></div>
      <div class="cat__tools">
        <label class="cat__select">
          <span>Joueurs</span>
          <select data-filter-players>
            <option value="all">Tous</option>
            <option value="solo">Solo (1)</option>
            <option value="small">2 à 4</option>
            <option value="large">5 à 6</option>
          </select>
        </label>
        <label class="cat__select">
          <span>Trier</span>
          <select data-sort>
            <option value="az">A → Z</option>
            <option value="dur">Durée</option>
          </select>
        </label>
      </div>
    </div>

    <p class="cat__count" data-count></p>
    <div class="cat__grid" data-grid></div>
    <p class="cat__empty" data-empty hidden>Aucune expérience ne correspond à ces filtres.</p>
  </div>
</section>

<!-- ===== MARQUEE ===== -->
<div class="marquee marquee--lime catmq">
  <div class="marquee__track" style="--mg:40px">
    <span class="marquee__item">Nouveautés chaque mois<span class="marquee__dot"></span></span>
    <span class="marquee__item">Jusqu'à 6 joueurs<span class="marquee__dot"></span></span>
    <span class="marquee__item">Free roaming<span class="marquee__dot"></span></span>
  </div>
</div>

<!-- ===== SNACK ===== -->
<div data-snack-teaser></div>

<div data-footer></div>

<script src="js/site.js"></script>
<script src="js/cat-list.js"></script>
<script src="js/tweaks.js"></script>
</body>
</html>
