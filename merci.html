<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merci - Altra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        altra: {
                            white: '#ffffff',
                            dark: '#333333',
                            anthracite: '#1a1a1a',
                            light: '#f5f5f5'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap"
        rel="stylesheet">
</head>

<body
    class="bg-altra-white text-altra-anthracite antialiased flex flex-col h-screen justify-center items-center text-center px-4">

    <h1 class="text-4xl md:text-6xl font-serif font-thin mb-6 uppercase tracking-widest text-altra-dark">Merci</h1>
    <p class="text-lg md:text-xl font-light text-gray-600 mb-8 max-w-lg">
        Votre inscription a bien été reçue. Nous vous tiendrons informé des prochaines actualités d'Altra.
    </p>

    <a href="index.html"
        class="bg-altra-dark text-white px-8 py-3 uppercase tracking-widest text-sm hover:bg-black transition-all duration-300">
        Retour à l'accueil
    </a>

</body>

</html>
