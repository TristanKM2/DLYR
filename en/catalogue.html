<body data-page="catalogue" data-nav="paper">

<!-- ===== PAGE HERO ===== -->
<section class="phero">
  <div class="wrap phero__grid">
    <div class="reveal">
      <h1 class="phero__title">Experiences<br>VR</h1>
      <p class="phero__lead">Immersive virtual reality experiences. Action, adventure, escape game or family fun: find the world that will thrill you.</p>
      <div class="phero__cue">
        <span class="btn-arrow btn-arrow--lime" data-arrow=""></span>
        <span style="font-family:var(--f-btn);font-size:clamp(18px,1.6vw,24px)">Explore our worlds</span>
      </div>
    </div>
    <div class="phero__deco reveal" data-d="1">
      <div class="ph"><img class="ph__img" loading="lazy" src="../uploads/spirit-of-the-wild-2.jpg" alt="Spirit of the Wild — VR game poster"></div>
      <div class="ph"><video class="ph__vid" src="../uploads/icarus-station.mp4" autoplay="" muted="" loop="" playsinline="" preload="metadata"></video></div>
    </div>
  </div>
</section>

<!-- ===== CATALOGUE ===== -->
<section class="section bg-ink cat">
  <div class="wrap">
    <div class="cat__bar reveal">
      <div class="cat__filters" data-genre-filters=""></div>
      <div class="cat__tools">
        <label class="cat__select">
          <span>Players</span>
          <select data-filter-players="">
            <option value="all">All</option>
            <option value="solo">Solo (1)</option>
            <option value="small">2 to 4</option>
            <option value="large">5 to 6</option>
          </select>
        </label>
        <label class="cat__select">
          <span>Sort</span>
          <select data-sort="">
            <option value="az">A → Z</option>
            <option value="dur">Duration</option>
          </select>
        </label>
      </div>
    </div>

    <p class="cat__count" data-count=""></p>
    <div class="cat__grid" data-grid=""></div>
    <p class="cat__empty" data-empty="" hidden="">No experience matches these filters.</p>
  </div>
</section>

<!-- ===== MARQUEE ===== -->
<div class="marquee marquee--lime catmq">
  <div class="marquee__track" style="--mg:40px">
    <span class="marquee__item">New releases every month<span class="marquee__dot"></span></span>
    <span class="marquee__item">Up to 6 players<span class="marquee__dot"></span></span>
    <span class="marquee__item">Free roaming<span class="marquee__dot"></span></span>
  </div>
</div>
